<!-- frontend_test/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AetherMail Auth Test</title>
    <!-- Load Google's modern Identity Services library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body style="font-family: Arial, sans-serif; padding: 50px;">

    <h2>AetherMail - Google Login Test</h2>
    
    <!-- The Google Sign-In Button Container -->
    <div id="g_id_onload"
         data-client_id="200195020062-86m6ol8stfnfkn96hirt44n2l3v538sn.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard"></div>

    <h3>Backend Response:</h3>
    <pre id="output" style="background: #f4f4f4; padding: 15px; border-radius: 5px;"></pre>

    <script>
        // This function is triggered by Google after successful login
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            document.getElementById('output').innerText = "Sending token to FastAPI Backend...\n";

            // Send the token to our FastAPI backend
            fetch("http://localhost:8000/api/v1/auth/google", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ token: response.credential })
            })
            .then(res => res.json())
            .then(data => {
                console.log("Success:", data);
                document.getElementById('output').innerText += JSON.stringify(data, null, 2);
                
                // In a real React app, you would save these to localStorage here:
                // localStorage.setItem("access_token", data.access_token);
            })
            .catch(error => {
                console.error("Error:", error);
                document.getElementById('output').innerText += "Error: " + error;
            });
        }
    </script>
</body>
</html>
